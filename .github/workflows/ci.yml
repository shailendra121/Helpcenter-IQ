name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  server:
    name: Server — lint, typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: npm ci --prefix ..
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --ci

  dashboard:
    name: Dashboard — lint, typecheck, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: npm ci --prefix ..
      - run: npm run lint
      - run: npm run build

  zendesk-app:
    name: Validate ZAF package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zendesk-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g zcli
      - run: zcli apps:validate
